<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小酥存货展示 · 斗罗大陆H5 库存系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: #03050f;
  color: #c8d6e5;
  min-height: 100vh;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(0, 255, 255, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255, 0, 255, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(255, 200, 0, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #03050f; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #00ffff, #ff00ff); border-radius: 3px; }

/* Animated BG grid */
.grid-bg {
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
  animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift {
  0% { transform: translate(0, 0); }
  100% { transform: translate(60px, 60px); }
}

/* Header */
.header {
  background: rgba(3,5,15,0.85);
  border-bottom: 1px solid rgba(0, 255, 255, 0.15);
  padding: 20px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(16px);
  box-shadow: 0 0 20px rgba(0,255,255,0.05);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  max-width: 1500px;
  margin: 0 auto;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo {
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00, #00ffff);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: neonFlow 3s ease infinite;
  letter-spacing: 2px;
}
@keyframes neonFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.logo::after {
  content: '✦';
  -webkit-text-fill-color: initial;
  color: #ff00ff;
  margin-left: 4px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.logo-sub {
  font-size: 12px;
  color: rgba(0,255,255,0.5);
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.search-box {
  position: relative;
}
.search-box input {
  background: rgba(0,255,255,0.04);
  border: 1px solid rgba(0,255,255,0.15);
  border-radius: 8px;
  padding: 8px 14px 8px 36px;
  color: #00ffff;
  font-size: 13px;
  width: 220px;
  outline: none;
  transition: all .3s;
  box-shadow: 0 0 6px rgba(0,255,255,0.05);
}
.search-box input::placeholder { color: rgba(0,255,255,0.25); }
.search-box input:focus {
  border-color: #ff00ff;
  background: rgba(255,0,255,0.04);
  width: 280px;
  box-shadow: 0 0 16px rgba(255,0,255,0.15);
}
.search-box .icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(0,255,255,0.4);
  font-size: 14px;
}
.filter-btns {
  display: flex;
  gap: 6px;
}
.filter-btn {
  padding: 6px 14px;
  border: 1px solid rgba(0,255,255,0.15);
  border-radius: 20px;
  background: transparent;
  color: rgba(0,255,255,0.5);
  cursor: pointer;
  font-size: 12px;
  transition: all .3s;
  letter-spacing: 1px;
}
.filter-btn:hover {
  border-color: #00ffff;
  color: #00ffff;
  box-shadow: 0 0 12px rgba(0,255,255,0.15);
}
.filter-btn.active {
  background: linear-gradient(135deg, rgba(0,255,255,0.12), rgba(255,0,255,0.08));
  border-color: #ff00ff;
  color: #fff;
  box-shadow: 0 0 16px rgba(255,0,255,0.15);
}

/* Stats Bar */
.stats-bar {
  max-width: 1500px;
  margin: 0 auto;
  padding: 20px 24px 0;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  position: relative;
  z-index: 1;
}
.stat-card {
  background: rgba(0,255,255,0.03);
  border: 1px solid rgba(0,255,255,0.08);
  border-radius: 12px;
  padding: 14px 16px;
  text-align: center;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 20%;
  right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #00ffff, transparent);
  opacity: 0.5;
}
.stat-card:hover {
  border-color: rgba(0,255,255,0.25);
  box-shadow: 0 0 20px rgba(0,255,255,0.08);
  transform: translateY(-2px);
}
.stat-card .num {
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, #00ffff, #ff00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}
.stat-card .label {
  font-size: 10px;
  color: rgba(0,255,255,0.4);
  margin-top: 4px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.stat-card.prize .num { background: linear-gradient(135deg, #ff00ff, #ffff00); -webkit-background-clip: text; background-clip: text; }
.stat-card.cigar .num { background: linear-gradient(135deg, #ffff00, #ff6600); -webkit-background-clip: text; background-clip: text; }

/* Main Content */
.main { 
  max-width: 1500px; 
  margin: 0 auto; 
  padding: 20px 24px 60px;
  position: relative;
  z-index: 1;
}

/* Server Group */
.server-group {
  margin-bottom: 32px;
}
.group-title {
  font-size: 15px;
  font-weight: 700;
  color: #00ffff;
  margin-bottom: 12px;
  border-left: 3px solid #ff00ff;
  padding-left: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-shadow: 0 0 10px rgba(0,255,255,0.3);
  letter-spacing: 1px;
}
.group-title span.count {
  font-size: 11px;
  font-weight: 400;
  color: rgba(0,255,255,0.35);
  letter-spacing: 0;
}

/* Server Card */
.server-card {
  background: linear-gradient(135deg, rgba(0,255,255,0.02) 0%, rgba(255,0,255,0.02) 100%);
  border: 1px solid rgba(0,255,255,0.08);
  border-radius: 14px;
  margin-bottom: 14px;
  overflow: hidden;
  transition: all .3s;
  position: relative;
}
.server-card::after {
  content: '';
  position: absolute;
  top: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,255,255,0.3), rgba(255,0,255,0.3), transparent);
  opacity: 0;
  transition: opacity .3s;
}
.server-card:hover {
  border-color: rgba(0,255,255,0.2);
  box-shadow: 0 0 24px rgba(0,255,255,0.06);
}
.server-card:hover::after { opacity: 1; }
.server-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  transition: background .3s;
}
.server-card-header:hover { background: rgba(0,255,255,0.02); }
.server-card-header .name {
  font-size: 15px;
  font-weight: 600;
  color: #e0f0ff;
  display: flex;
  align-items: center;
  gap: 10px;
  text-shadow: 0 0 8px rgba(0,255,255,0.1);
}
.server-card-header .name .badge {
  font-size: 10px;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 1px;
}
.badge-wan { 
  background: rgba(0,255,255,0.08); 
  color: #00ffff; 
  border: 1px solid rgba(0,255,255,0.15);
}
.badge-huang { 
  background: rgba(255,255,0,0.06); 
  color: #ffff00; 
  border: 1px solid rgba(255,255,0,0.12);
}
.badge-xiong { 
  background: rgba(255,0,255,0.06); 
  color: #ff00ff; 
  border: 1px solid rgba(255,0,255,0.12);
}
.server-card-header .summary {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: rgba(0,255,255,0.4);
}
.server-card-header .summary span { white-space: nowrap; }
.server-card-header .arrow {
  color: rgba(0,255,255,0.3);
  font-size: 14px;
  transition: transform .3s, color .3s;
  margin-left: 8px;
}
.server-card:hover .arrow { color: #00ffff; }
.server-card.open .arrow { 
  transform: rotate(180deg); 
  color: #ff00ff;
}

/* Content Grid */
.server-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.server-card.open .server-content { max-height: 4000px; }
.server-content-inner {
  padding: 0 18px 18px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.category-block {
  background: rgba(0,255,255,0.02);
  border: 1px solid rgba(0,255,255,0.06);
  border-radius: 10px;
  padding: 12px 14px;
  transition: all .3s;
  position: relative;
  overflow: hidden;
}
.category-block::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 2px;
  height: 100%;
  background: linear-gradient(180deg, #00ffff, #ff00ff);
  opacity: 0.3;
}
.category-block:hover {
  border-color: rgba(0,255,255,0.15);
  box-shadow: 0 0 12px rgba(0,255,255,0.04);
}
.category-title {
  font-size: 12px;
  font-weight: 600;
  color: rgba(0,255,255,0.6);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  letter-spacing: 1px;
}
.category-title .count-badge {
  font-size: 10px;
  background: rgba(0,255,255,0.06);
  padding: 1px 6px;
  border-radius: 6px;
  color: rgba(0,255,255,0.5);
  border: 1px solid rgba(0,255,255,0.06);
}
.item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid rgba(0,255,255,0.03);
  font-size: 13px;
  transition: all .2s;
}
.item-row:hover {
  background: rgba(0,255,255,0.02);
  padding-left: 4px;
  border-radius: 4px;
}
.item-row:last-child { border-bottom: none; }
.item-name { color: rgba(200,220,240,0.8); }
.item-qty {
  font-weight: 700;
  color: #e0f0ff;
  min-width: 36px;
  text-align: right;
}
.item-qty.high { 
  color: #ffff00; 
}
.item-qty.vhigh { 
  color: #ff00ff; 
}
.empty-text {
  color: rgba(0,255,255,0.15);
  font-size: 12px;
  font-style: italic;
}

/* Hidden filter */
.server-card.hidden { display: none; }

/* ===== 订单记录页样式 ===== */
.tab-content { display: none; }
.tab-content.active { display: block; }

.order-page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}
.order-title {
  font-size: 18px;
  font-weight: 700;
  color: #00ffff;
  border-left: 3px solid #ff00ff;
  padding-left: 12px;
  margin-bottom: 20px;
  text-shadow: 0 0 10px rgba(0,255,255,0.3);
}
.order-form {
  background: rgba(0,255,255,0.03);
  border: 1px solid rgba(0,255,255,0.08);
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.order-form .form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.order-form .form-group.full { grid-column: 1 / -1; }
.order-form label {
  font-size: 12px;
  color: rgba(0,255,255,0.6);
  letter-spacing: 1px;
}
.order-form select,
.order-form input[type="text"],
.order-form input[type="number"] {
  background: rgba(0,255,255,0.04);
  border: 1px solid rgba(0,255,255,0.15);
  border-radius: 8px;
  padding: 8px 12px;
  color: #e0f0ff;
  font-size: 14px;
  outline: none;
  transition: border-color .3s;
}
.order-form select:focus,
.order-form input[type="text"]:focus,
.order-form input[type="number"]:focus {
  border-color: #ff00ff;
}
.order-form select option {
  background: #0a0f1e;
  color: #c8d6e5;
}
.order-form .hint {
  font-size: 11px;
  color: rgba(0,255,255,0.35);
  min-height: 16px;
}
.order-form .hint.error { color: #ff4466; }
.order-form .hint.ok { color: #44ff88; }
.order-form .btn-row { grid-column: 1 / -1; display: flex; gap: 10px; }
.btn-neon {
  padding: 8px 22px;
  border: 1px solid rgba(0,255,255,0.2);
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(0,255,255,0.08), rgba(255,0,255,0.05));
  color: #00ffff;
  font-size: 13px;
  cursor: pointer;
  transition: all .3s;
  letter-spacing: 1px;
}
.btn-neon:hover {
  border-color: #ff00ff;
  color: #fff;
  box-shadow: 0 0 16px rgba(255,0,255,0.2);
}
.btn-neon.danger {
  border-color: rgba(255,68,102,0.3);
  color: #ff6688;
}
.btn-neon.danger:hover {
  border-color: #ff4466;
  box-shadow: 0 0 16px rgba(255,68,102,0.2);
}
.order-table-wrap {
  background: rgba(0,255,255,0.02);
  border: 1px solid rgba(0,255,255,0.06);
  border-radius: 14px;
  padding: 16px 20px;
  overflow-x: auto;
}
.order-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.order-table th {
  text-align: left;
  padding: 8px 10px;
  color: rgba(0,255,255,0.5);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(0,255,255,0.08);
}
.order-table td {
  padding: 7px 10px;
  border-bottom: 1px solid rgba(0,255,255,0.03);
  color: rgba(200,220,240,0.8);
}
.order-table tr:hover td {
  background: rgba(0,255,255,0.02);
}
.order-table .td-del {
  color: #ff4466;
  cursor: pointer;
  font-size: 15px;
}
.order-table .td-del:hover { color: #ff0011; }
.order-empty {
  color: rgba(0,255,255,0.2);
  font-size: 13px;
  font-style: italic;
  text-align: center;
  padding: 24px 0;
}
</style>
<script src="data.js"></script>

</head>
<body>

<div class="grid-bg"></div>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <div class="logo">小酥存货</div>
      <div class="logo-sub">斗罗大陆H5 · 跨服库存</div>
    </div>
    <div class="header-right">
      <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索服务器 / 物品名称..." oninput="filterAll()">
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" data-group="all" onclick="filterGroup(this, 'all')">全部</button>
        <button class="filter-btn" data-group="天使黄金" onclick="filterGroup(this, '天使黄金')">👑 天使黄金</button>
        <button class="filter-btn" data-group="天使爆爽" onclick="filterGroup(this, '天使爆爽')">💥 天使爆爽</button>
        <button class="filter-btn" data-group="天使集结" onclick="filterGroup(this, '天使集结')">⚔️ 天使集结</button>
        <button class="filter-btn" data-group="天使周年" onclick="filterGroup(this, '天使周年')">🎂 天使周年</button>
        <button class="filter-btn" data-group="天使万魂" onclick="filterGroup(this, '天使万魂')">⚔️ 天使万魂</button>
        <button class="filter-btn" data-group="神龍界域" onclick="filterGroup(this, '神龍界域')">🐉 神龍界域</button>
        <button class="filter-btn" data-group="诸天万域" onclick="filterGroup(this, '诸天万域')">🌌 诸天万域</button>
      </div>
      <div class="filter-btns" style="margin-left:8px;">
        <button class="filter-btn" id="btnTabStock" onclick="switchTab('stock')" style="background:rgba(0,255,255,0.10);border-color:#00ffff;color:#00ffff;">📦 库存浏览</button>
        <button class="filter-btn" id="btnTabOrder" onclick="switchTab('order')">📝 订单记录</button>
      </div>
    </div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="main" id="appStock"></div>
<div class="main" id="appOrder" style="display:none;">
  <div class="order-page">
    <div class="order-title">📝 订单记录</div>
    <div class="order-form" id="orderForm">
      <div class="form-group">
        <label>区服</label>
        <select id="orderServer" onchange="onOrderServerChange()">
          <option value="">-- 选择区服 --</option>
        </select>
      </div>
      <div class="form-group">
        <label>收货玩家</label>
        <input type="text" id="orderBuyer" placeholder="输入玩家名">
      </div>
      <div class="form-group">
        <label>物品名称</label>
        <select id="orderItem" onchange="onOrderItemChange()">
          <option value="">-- 先选择区服 --</option>
        </select>
      </div>
      <div class="form-group">
        <label>购买数量</label>
        <input type="number" id="orderQty" min="1" value="1" oninput="onOrderQtyChange()">
        <div class="hint" id="orderHint">库存：--</div>
      </div>
      <div class="form-group">
        <label>平台版本</label>
        <input type="text" id="orderPlatform" value="天使黄金" readonly style="opacity:0.7;cursor:default;">
      </div>
      <div class="form-group full btn-row">
        <button class="btn-neon" onclick="addOrder()">＋ 添加订单</button>
        <button class="btn-neon" onclick="exportOrders()">📊 导出 .xls</button>
        <button class="btn-neon danger" onclick="clearOrders()">🗑 清空订单</button>
      </div>
    </div>
    <div class="order-table-wrap">
      <table class="order-table" id="orderTable">
        <thead><tr>
          <th>#</th><th>区服</th><th>收货玩家</th><th>物品名称</th><th>数量</th><th>平台版本</th><th></th>
        </tr></thead>
        <tbody id="orderTbody">
        </tbody>
      </table>
      <div class="order-empty" id="orderEmpty">暂无订单，请上方添加</div>
    </div>
  </div>
</div>

<script>
// ===== 数据区：在此粘贴你的存货数据 =====
// rawData 已分离到 data.js
// ===== 渲染逻辑 =====
const app = document.getElementById('appStock');
const appOrder = document.getElementById('appOrder');
const statsBar = document.getElementById('statsBar');
let currentGroup = 'all';
let currentSearch = '';
let currentTab = 'stock';

function getQtyClass(q) {
  if (q >= 200) return 'vhigh';
  if (q >= 80) return 'high';
  return '';
}

function renderStats() {
  const totalServers = rawData.length;
  let totalItems = 0;
  const allItems = {};
  const usedServers = rawData.filter(s => {
    for (const c of s.items) {
      if (c.list.length > 0) return true;
    }
    return false;
  }).length;

  rawData.forEach(s => {
    s.items.forEach(cat => {
      cat.list.forEach(item => {
        totalItems += item.q;
        allItems[item.n] = (allItems[item.n] || 0) + item.q;
      });
    });
  });

  const topItem = Object.entries(allItems).sort((a,b) => b[1]-a[1])[0];
  const prizeTotal = rawData.reduce((sum, s) => {
    let p = 0;
    s.items.forEach(cat => {
      if (cat.cat !== '背包' && cat.cat !== '雪茄') {
        cat.list.forEach(item => p += item.q);
      }
    });
    return sum + p;
  }, 0);

  statsBar.innerHTML = `
    <div class="stat-card"><div class="num">${totalServers}</div><div class="label">管理服务器</div></div>
    <div class="stat-card"><div class="num">${usedServers}</div><div class="label">有库存服务器</div></div>
    <div class="stat-card"><div class="num">${totalItems.toLocaleString()}</div><div class="label">总物品数量</div></div>
    <div class="stat-card prize"><div class="num">${prizeTotal.toLocaleString()}</div><div class="label">大奖/小奖数量</div></div>
    <div class="stat-card cigar"><div class="num">${topItem ? topItem[1].toLocaleString() : 0}</div><div class="label">最多物品: ${topItem ? topItem[0] : '-'}</div></div>
  `;
}

function getBadge(serverName) {
  if (serverName.includes('万魂')) return 'badge-wan';
  if (serverName.includes('黄金')) return 'badge-huang';
  if (serverName.includes('神龍')) return 'badge-xiong';
  return 'badge-huang';
}

function getShortGroup(name) {
  if (name.includes('集结')) return '天使集结';
  if (name.includes('周年')) return '天使周年';
  if (name.includes('爆爽')) return '天使爆爽';
  if (name.includes('万魂')) return '天使万魂';
  if (name.includes('黄金')) return '天使黄金';
  if (name === '神龍界域') return '神龍界域';
  if (name === '诸天万域') return '诸天万域';
  return '天使黄金';
}

function countItems(data) {
  let c = 0;
  data.forEach(cat => { c += cat.list.length; });
  return c;
}

function render() {
  renderStats();

  const groups = {};
  rawData.forEach(s => {
    const g = s.group;
    if (!groups[g]) groups[g] = [];
    groups[g].push(s);
  });

  const groupOrder = ['天使黄金', '天使爆爽', '天使集结', '天使周年', '天使万魂', '神龍界域', '诸天万域'];
  let html = '';

  groupOrder.forEach(g => {
    if (!groups[g]) return;
    const servers = groups[g];
    const visibleServers = servers.filter(s => isServerVisible(s));
    if (visibleServers.length === 0) return;

    const badgeClass = getBadge(servers[0].server);
    html += `<div class="server-group" data-group-name="${g}">
      <div class="group-title">
        ${g === '天使黄金' ? '👑' : g === '天使爆爽' ? '💥' : g === '天使集结' ? '⚔️' : g === '天使周年' ? '🎂' : g === '天使万魂' ? '⚔️' : g === '神龍界域' ? '🐉' : '🌌'}
        ${g}大区
        <span class="count">${visibleServers.length} 个服务器</span>
      </div>`;

    servers.forEach(s => {
      const totalQty = s.items.reduce((sum, cat) => sum + cat.list.reduce((s2, item) => s2 + item.q, 0), 0);
      const itemCount = countItems(s.items);
      const classes = `server-card ${isServerVisible(s) ? '' : 'hidden'}`;

      html += `<div class="${classes}" data-server="${s.server}" data-group="${s.group}">
        <div class="server-card-header" onclick="toggleServer(this)">
          <div class="name">
            ${s.server}
            <span class="badge ${badgeClass}">${getShortGroup(s.server)}</span>
          </div>
          <div class="summary">
            <span>📦 ${itemCount} 类物品</span>
            <span>📊 ${totalQty.toLocaleString()} 件</span>
          </div>
          <div class="arrow">▼</div>
        </div>
        <div class="server-content">
          <div class="server-content-inner">
            ${renderCategories(s.items)}
          </div>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  app.innerHTML = html;
}

function renderCategories(categories) {
  let html = '';
  categories.forEach(cat => {
    if (cat.list.length === 0) {
      html += `<div class="category-block">
        <div class="category-title">${cat.cat}</div>
        <div class="empty-text">暂无可展示商品</div>
      </div>`;
      return;
    }
    html += `<div class="category-block">
      <div class="category-title">
        ${catIcon(cat.cat)} ${cat.cat}
        <span class="count-badge">${cat.list.length}</span>
      </div>`;
    cat.list.forEach(item => {
      html += `<div class="item-row">
        <span class="item-name">${item.n.includes('雪茄') ? '🚬' : '🎁'} ${item.n}</span>
        <span class="item-qty ${getQtyClass(item.q)}">×${item.q}</span>
      </div>`;
    });
    html += `</div>`;
  });
  return html;
}

function catIcon(name) {
  if (name === '背包') return '🎒';
  if (name === '雪茄') return '🚬';
  if (name === '大奖') return '🏆';
  if (name === '小奖（本月）') return '📅';
  if (name === '小奖（历史）') return '📜';
  return '📦';
}

function toggleServer(header) {
  const card = header.closest('.server-card');
  card.classList.toggle('open');
}

function isServerVisible(server) {
  if (currentSearch === '' && currentGroup === 'all') return true;
  if (currentGroup !== 'all' && !server.server.includes(currentGroup)) return false;
  if (currentSearch !== '') {
    const s = currentSearch.toLowerCase();
    if (server.server.toLowerCase().includes(s)) return true;
    for (const cat of server.items) {
      for (const item of cat.list) {
        if (item.n.toLowerCase().includes(s)) return true;
      }
    }
    return false;
  }
  return true;
}

function filterGroup(btn, group) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentGroup = group;
  render();
}

function filterAll() {
  currentSearch = document.getElementById('searchInput').value;
  render();
}

// 初始化
render();
setTimeout(() => {
  document.querySelectorAll('.server-card:not(.hidden)').forEach((card, i) => {
    if (i < 3) card.classList.add('open');
  });
}, 100);

// ===== 标签页切换 =====
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('appStock').style.display = tab === 'stock' ? '' : 'none';
  document.getElementById('appOrder').style.display = tab === 'order' ? '' : 'none';
  document.getElementById('statsBar').style.display = tab === 'stock' ? '' : 'none';
  var btnStock = document.getElementById('btnTabStock');
  var btnOrder = document.getElementById('btnTabOrder');
  btnStock.style.background = tab === 'stock' ? 'rgba(0,255,255,0.10)' : '';
  btnStock.style.borderColor = tab === 'stock' ? '#00ffff' : '';
  btnStock.style.color = tab === 'stock' ? '#00ffff' : '';
  btnOrder.style.background = tab === 'order' ? 'rgba(0,255,255,0.10)' : '';
  btnOrder.style.borderColor = tab === 'order' ? '#00ffff' : '';
  btnOrder.style.color = tab === 'order' ? '#00ffff' : '';
  if (tab === 'order') initOrderPage();
}

// ===== 订单功能 =====
let orders = [];

function getInventoryQty(serverName, itemName) {
  var sv = rawData.find(function(s){ return s.server === serverName; });
  if (!sv) return 0;
  var qty = 0;
  sv.items.forEach(function(cat){
    cat.list.forEach(function(item){
      if (item.n === itemName) qty += item.q;
    });
  });
  return qty;
}

function initOrderPage() {
  var sel = document.getElementById('orderServer');
  if (sel.options.length > 1) return;
  rawData.forEach(function(s){
    var opt = document.createElement('option');
    opt.value = s.server;
    opt.textContent = s.server;
    sel.appendChild(opt);
  });
}

function onOrderServerChange() {
  var svName = document.getElementById('orderServer').value;
  var itemSel = document.getElementById('orderItem');
  itemSel.innerHTML = '<option value="">-- 选择物品 --</option>';
  document.getElementById('orderHint').textContent = '库存：--';
  if (!svName) return;
  var sv = rawData.find(function(s){ return s.server === svName; });
  if (!sv) return;
  var seen = {};
  sv.items.forEach(function(cat){
    cat.list.forEach(function(item){
      if (seen[item.n]) return;
      seen[item.n] = true;
      var opt = document.createElement('option');
      opt.value = item.n;
      opt.textContent = item.n + '（库存:' + item.q + '）';
      opt.dataset.qty = item.q;
      itemSel.appendChild(opt);
    });
  });
}

function onOrderItemChange() {
  var svName = document.getElementById('orderServer').value;
  var itemName = document.getElementById('orderItem').value;
  var hint = document.getElementById('orderHint');
  if (!svName || !itemName) {
    hint.textContent = '库存：--';
    hint.className = 'hint';
    return;
  }
  var qty = getInventoryQty(svName, itemName);
  hint.textContent = '库存：' + qty + '　当前输入：' + (document.getElementById('orderQty').value || 0);
  hint.className = 'hint';
}

function onOrderQtyChange() {
  var svName = document.getElementById('orderServer').value;
  var itemName = document.getElementById('orderItem').value;
  var hint = document.getElementById('orderHint');
  if (!svName || !itemName) return;
  var qty = getInventoryQty(svName, itemName);
  var inputQty = parseInt(document.getElementById('orderQty').value) || 0;
  hint.textContent = '库存：' + qty + '　当前输入：' + inputQty;
  if (inputQty > qty) {
    hint.textContent += '　⚠ 超出库存！';
    hint.className = 'hint error';
  } else if (inputQty > 0) {
    hint.className = 'hint ok';
  } else {
    hint.className = 'hint';
  }
}

function addOrder() {
  var svName = document.getElementById('orderServer').value;
  var buyer = document.getElementById('orderBuyer').value.trim();
  var itemName = document.getElementById('orderItem').value;
  var qty = parseInt(document.getElementById('orderQty').value) || 0;
  var platform = document.getElementById('orderPlatform').value;
  if (!svName) { alert('请选择区服'); return; }
  if (!buyer) { alert('请输入收货玩家名'); return; }
  if (!itemName) { alert('请选择物品名称'); return; }
  if (qty <= 0) { alert('数量必须大于0'); return; }
  var stock = getInventoryQty(svName, itemName);
  if (qty > stock) { alert('购买数量（' + qty + '）超出库存（' + stock + '）！'); return; }
  orders.push({ server: svName, buyer: buyer, item: itemName, qty: qty, platform: platform });
  renderOrders();
  document.getElementById('orderItem').value = '';
  document.getElementById('orderQty').value = 1;
  document.getElementById('orderHint').textContent = '库存：--';
}

function renderOrders() {
  var tbody = document.getElementById('orderTbody');
  var empty = document.getElementById('orderEmpty');
  if (orders.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  var html = '';
  orders.forEach(function(o, i){
    html += '<tr>';
    html += '<td>' + (i+1) + '</td>';
    html += '<td>' + escapeHtml(o.server) + '</td>';
    html += '<td>' + escapeHtml(o.buyer) + '</td>';
    html += '<td>' + escapeHtml(o.item) + '</td>';
    html += '<td>' + o.qty + '</td>';
    html += '<td>' + escapeHtml(o.platform) + '</td>';
    html += '<td class="td-del" onclick="removeOrder(' + i + ')" title="删除">✕</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function removeOrder(idx) {
  orders.splice(idx, 1);
  renderOrders();
}

function clearOrders() {
  if (orders.length === 0) return;
  if (!confirm('确定清空所有订单？')) return;
  orders = [];
  renderOrders();
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

var ITEM_ID_MAP = {
  "仙草皇礼包": "100332",
  "至宝仙草礼包": "100315",
  "海神神装宝箱": "100339",
  "昊天令礼包": "100343",
  "深海沉银": "102292",
  "蓝银之种": "108008",
  "唐门淬火石宝箱": "6200005",
  "冰火之泉": "108006",
  "雪茄选择宝箱1": "1036971",
  "雪茄选择宝箱2": "1038569",
  "雪茄选择宝箱3": "1038670",
  "雪茄选择宝箱4": "1038771",
  "雪茄选择宝箱5": "1038720",
  "雪茄选择宝箱（2605）": "1056271"
};
function lookupItemId(name) {
  return ITEM_ID_MAP[name] || name;
}
function exportOrders() {
  if (orders.length === 0) { alert('暂无订单可导出'); return; }
  // 表头（独立列）
  var headers = [['区服', '收货玩家', '物品ID', '物品数量', '平台版本']];
  // 数据行
  var rows = orders.map(function(o){
    return [o.server, o.buyer, lookupItemId(o.item), o.qty, o.platform];
  });
  var allRows = headers.concat(rows);
  // 生成 .xlsx
  var ws = XLSX.utils.aoa_to_sheet(allRows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '订单记录');
  XLSX.writeFile(wb, '订单记录_' + new Date().toISOString().slice(0,10) + '.xlsx');
}
window.onerror = function(msg, url, line, col, err) {
  document.body.innerHTML = '<div style="color:red;padding:20px;font-size:18px;white-space:pre-wrap;">JS Error: ' + msg + '\nLine: ' + line + ':' + col + '\n' + (err?.stack || '') + '</div>' + document.body.innerHTML;
};
try { render(); switchTab('stock'); } catch(e) {
  document.body.innerHTML = '<div style="color:red;padding:20px;font-size:18px;">Render Error: ' + e.message + '</div>';
}
